site_name: "Occulus"
site_description: "Multi-platform point cloud analysis — registration, segmentation, meshing, and feature extraction"
site_url: "https://chrislyonsky.github.io/occulus/"
repo_url: "https://github.com/chrislyonsKY/occulus"
repo_name: "chrislyonsKY/occulus"
edit_uri: "edit/main/docs/"

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - CLI: guide/cli.md
      - Tiling Large Datasets: guide/tiling.md
      - CRS & Reprojection: guide/crs.md
      - Web Export: guide/export.md
  - API Reference:
      - Types: api/types.md
      - I/O: api/io.md
      - Filters: api/filters.md
      - Normals: api/normals.md
      - Registration: api/registration.md
      - Segmentation: api/segmentation.md
      - Mesh: api/mesh.md
      - Features: api/features.md
      - Metrics: api/metrics.md
      - Raster (DEM/DSM/DTM): api/raster.md
      - Change Detection (M3C2): api/change.md
      - Analysis (Volume / Cross-Sections): api/analysis.md
      - CRS Transforms: api/crs.md
      - Tiling: api/tiling.md
      - Colorize: api/colorize.md
      - Export (3D Tiles / Potree): api/export.md
      - ML Segmentation: api/ml.md
      - Powerline Detection: api/powerlines.md
      - COPC Streaming: api/copc.md
      - Visualization: api/viz.md
      - CLI: api/cli.md
  - Architecture: architecture.md
  - Release Notes: release-notes.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chrislyonsKY
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/occulus/
